<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>StrukSnap</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3F8C7A">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#F4F8F6;
    --surface:#FFFFFF;
    --primary:#3F8C7A;
    --primary-dark:#2F6E5F;
    --primary-light:#DCEEE7;
    --accent:#F6A969;
    --text:#20302B;
    --text-muted:#6B7D77;
    --danger:#D96C6C;
    --radius-lg:22px;
    --radius-md:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100svh;
  }
  .app{
    max-width:430px;
    margin:0 auto;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    padding:24px 20px 32px;
  }
  header{
    text-align:center;
    margin-bottom:18px;
  }
  header h1{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:26px;
    margin:0;
    color:var(--primary-dark);
    letter-spacing:-0.02em;
  }
  header p{
    margin:4px 0 0;
    font-size:13px;
    color:var(--text-muted);
  }

  /* ---- STEP: CAPTURE ---- */
  .capture-stage{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:22px;
    padding:20px 0;
  }
  .shutter-ring{
    width:168px;
    height:168px;
    border-radius:50%;
    background:var(--primary-light);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .15s ease;
  }
  .shutter-ring:active{ transform:scale(.96); }
  .shutter-btn{
    width:130px;
    height:130px;
    border-radius:50%;
    background:var(--primary);
    border:none;
    box-shadow:0 8px 22px rgba(63,140,122,.35);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .shutter-btn svg{ width:50px; height:50px; }
  .capture-hint{
    font-size:14px;
    color:var(--text-muted);
    text-align:center;
    max-width:240px;
  }

  /* ---- STEP: FORM ---- */
  .form-stage{ display:none; flex:1; flex-direction:column; gap:16px; }
  .form-stage.active{ display:flex; }
  .capture-stage.hidden{ display:none; }

  .preview-card{
    background:var(--surface);
    border-radius:var(--radius-lg);
    padding:10px;
    box-shadow:0 4px 18px rgba(32,48,43,.06);
  }
  .preview-card img{
    width:100%;
    display:block;
    border-radius:var(--radius-md);
    max-height:220px;
    object-fit:cover;
  }
  .retake-btn{
    width:100%;
    margin-top:8px;
    background:none;
    border:none;
    color:var(--primary-dark);
    font-family:'Inter',sans-serif;
    font-weight:500;
    font-size:13px;
    padding:8px;
    cursor:pointer;
  }

  label{
    font-size:13px;
    font-weight:500;
    color:var(--text-muted);
    margin-bottom:6px;
    display:block;
  }
  .field{ margin-bottom:2px; }
  input[type="text"], textarea{
    width:100%;
    background:var(--surface);
    border:1.5px solid #E4ECE9;
    border-radius:var(--radius-md);
    padding:13px 14px;
    font-family:'Inter',sans-serif;
    font-size:15px;
    color:var(--text);
    resize:none;
  }
  input[type="text"]:focus, textarea:focus{
    outline:none;
    border-color:var(--primary);
  }

  .submit-btn{
    margin-top:auto;
    width:100%;
    background:var(--accent);
    color:#3A2410;
    border:none;
    border-radius:var(--radius-md);
    padding:16px;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:opacity .15s;
  }
  .submit-btn:disabled{ opacity:.6; }

  .status-msg{
    text-align:center;
    font-size:13px;
    min-height:18px;
    margin-top:10px;
  }
  .status-msg.error{ color:var(--danger); }
  .status-msg.success{ color:var(--primary-dark); }

  /* ---- STEP: SUCCESS ---- */
  .success-stage{ display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; }
  .success-stage.active{ display:flex; }
  .success-circle{
    width:96px; height:96px; border-radius:50%;
    background:var(--primary-light);
    display:flex; align-items:center; justify-content:center;
  }
  .success-circle svg{ width:42px; height:42px; }
  .success-stage h2{ font-family:'Fredoka',sans-serif; font-size:20px; margin:0; color:var(--primary-dark); }
  .success-stage p{ font-size:14px; color:var(--text-muted); margin:0; max-width:240px; }
  .again-btn{
    margin-top:10px;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:var(--radius-md);
    padding:13px 26px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
  }

  input[type=file]{ display:none; }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>StrukSnap</h1>
    <p>Foto struk, tulis keterangan, beres.</p>
  </header>

  <!-- STAGE 1: CAPTURE -->
  <div class="capture-stage" id="captureStage">
    <label class="shutter-ring" for="photoInput">
      <span class="shutter-btn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 8a2 2 0 0 1 2-2h1.2l.7-1.4A2 2 0 0 1 9.7 3.5h4.6a2 2 0 0 1 1.8 1.1L16.8 6H18a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z" stroke="#FFFFFF" stroke-width="1.6"/>
          <circle cx="12" cy="13" r="3.4" stroke="#FFFFFF" stroke-width="1.6"/>
        </svg>
      </span>
    </label>
    <input type="file" id="photoInput" accept="image/*" capture="environment">
    <p class="capture-hint">Ketuk tombol untuk memotret struk atau bukti pembelian</p>
  </div>

  <!-- STAGE 2: FORM -->
  <div class="form-stage" id="formStage">
    <div class="preview-card">
      <img id="previewImg" src="" alt="Pratinjau foto">
      <button type="button" class="retake-btn" id="retakeBtn">Foto ulang</button>
    </div>

    <div class="field">
      <label for="pembelian">Keterangan pembelian</label>
      <textarea id="pembelian" rows="2" placeholder="Contoh: Beli kertas A4 2 rim"></textarea>
    </div>

    <div class="field">
      <label for="klien">Nama klien</label>
      <input type="text" id="klien" placeholder="Contoh: PT Maju Jaya">
    </div>

    <button type="button" class="submit-btn" id="submitBtn">
      Kirim
    </button>
    <p class="status-msg" id="statusMsg"></p>
  </div>

  <!-- STAGE 3: SUCCESS -->
  <div class="success-stage" id="successStage">
    <div class="success-circle">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="#3F8C7A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>Terkirim!</h2>
    <p>Data sudah dikirim dan akan tersusun otomatis di Google Sheet.</p>
    <button type="button" class="again-btn" id="againBtn">Foto lagi</button>
  </div>
</div>

<script>
  // ============================================================
  // GANTI URL INI dengan Webhook URL dari workflow n8n kamu
  // ============================================================
  const N8N_WEBHOOK_URL = "https://your-n8n-instance.com/webhook/strukssnap";

  const captureStage = document.getElementById('captureStage');
  const formStage = document.getElementById('formStage');
  const successStage = document.getElementById('successStage');

  const photoInput = document.getElementById('photoInput');
  const previewImg = document.getElementById('previewImg');
  const retakeBtn = document.getElementById('retakeBtn');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');
  const againBtn = document.getElementById('againBtn');

  let selectedFile = null;

  function showStage(stage){
    [captureStage, formStage, successStage].forEach(s => s.classList.remove('active'));
    captureStage.style.display = 'none';
    formStage.classList.remove('active');
    successStage.classList.remove('active');

    if (stage === 'capture'){ captureStage.style.display = 'flex'; }
    if (stage === 'form'){ formStage.classList.add('active'); }
    if (stage === 'success'){ successStage.classList.add('active'); }
  }

  photoInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;
    previewImg.src = URL.createObjectURL(file);
    statusMsg.textContent = '';
    statusMsg.className = 'status-msg';
    showStage('form');
  });

  retakeBtn.addEventListener('click', () => {
    photoInput.value = '';
    selectedFile = null;
    showStage('capture');
  });

  againBtn.addEventListener('click', () => {
    photoInput.value = '';
    selectedFile = null;
    document.getElementById('pembelian').value = '';
    document.getElementById('klien').value = '';
    statusMsg.textContent = '';
    showStage('capture');
  });

  submitBtn.addEventListener('click', async () => {
    if (!selectedFile){
      statusMsg.textContent = 'Foto belum ada, ambil foto dulu ya.';
      statusMsg.className = 'status-msg error';
      return;
    }

    const pembelian = document.getElementById('pembelian').value.trim();
    const klien = document.getElementById('klien').value.trim();

    submitBtn.disabled = true;
    submitBtn.textContent = 'Mengirim...';
    statusMsg.textContent = '';
    statusMsg.className = 'status-msg';

    try{
      const formData = new FormData();
      formData.append('tanggal', new Date().toISOString().slice(0,10));
      formData.append('pembelian', pembelian);
      formData.append('klien', klien);
      formData.append('foto', selectedFile, selectedFile.name || 'struk.jpg');

      const res = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        body: formData
      });

      if (!res.ok) throw new Error('Gagal mengirim (status ' + res.status + ')');

      showStage('success');
    }catch(err){
      statusMsg.textContent = 'Gagal mengirim: ' + err.message;
      statusMsg.className = 'status-msg error';
    }finally{
      submitBtn.disabled = false;
      submitBtn.textContent = 'Kirim';
    }
  });

  // Daftarkan service worker (biar bisa di-install sebagai PWA)
  if ('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
