<style>
        body {

            -webkit-tap-highlight-color: transparent;

<body class="bg-background text-on-surface min-h-screen gradient-mesh">
<!-- ======================================================================
     KONFIGURASI — ISI 1 BARIS INI SAJA
     Tempel URL Production webhook n8n kamu di antara tanda kutip.
     Contoh: "https://n8n.tangguhriyadi.com/webhook/snapstruk/submit"
     ====================================================================== -->
<script>
        const WEBHOOK_URL = "https://n8n.tangguhriyadi.com/webhook/snapstruk/submit";
</script>

<header class="w-full pt-stack-md flex flex-col items-center justify-center px-container-padding pb-base">
<div class="flex flex-col items-center gap-base">
<div class="w-24 h-24 mb-base transition-transform duration-500 hover:rotate-3">
<img alt="Maskot SnapLedger" class="w-full h-full object-contain" src="logo.png"/>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight">SnapLedger</h1>
<p class="text-on-surface-variant font-body-md text-body-md -mt-2">Catat pengeluaran semudah berfoto</p>
</div>
</header>
<main class="flex justify-center px-gutter py-section-gap">
<div class="w-full max-w-[500px] bg-surface-container-lowest rounded-xl p-container-padding soft-shadow flex flex-col gap-section-gap relative overflow-hidden border border-white/40">
<!-- Bagian Kamera -->
<section class="flex flex-col gap-stack-md">
<div class="relative group" id="photo-preview-container">
<div class="aspect-[4/3] w-full bg-surface-container-low rounded-lg flex flex-col items-center justify-center border-2 border-dashed border-outline-variant transition-all hover:border-primary/50 group-hover:bg-surface-container overflow-hidden">
<div class="flex flex-col items-center gap-base text-on-surface-variant" id="placeholder-content">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'wght' 200;">image</span>
<span class="font-label-md text-label-md">Belum ada foto terpilih</span>
</div>
<img alt="" class="hidden w-full h-full object-cover" id="image-display" src=""/>
<button class="hidden absolute top-4 right-4 bg-error/90 text-on-error p-2 rounded-full active-press shadow-lg" id="remove-photo">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</div>
<button class="w-full h-16 bg-secondary-container text-on-secondary-container rounded-lg flex items-center justify-center gap-base font-headline-sm text-headline-sm active-press transition-colors hover:bg-secondary-fixed shadow-sm" id="camera-btn">
<span class="material-symbols-outlined text-3xl">photo_camera</span>
                    Ambil Foto
                </button>
<input accept="image/*" capture="environment" class="hidden" id="camera-input" type="file"/>
</section>
<!-- Bagian Keterangan -->
<section class="flex flex-col gap-stack-md">
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-primary px-1" for="keterangan">Keterangan</label>
<div class="relative">
<textarea class="w-full bg-surface-container-low border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg p-stack-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 transition-all resize-none" id="keterangan" placeholder="Contoh: Makan siang nasi padang..." rows="3"></textarea>
</div>
</div>
<div class="flex flex-wrap gap-base">
<span class="px-4 py-1.5 bg-tertiary-fixed text-on-tertiary-fixed-variant rounded-full font-label-sm text-label-sm cursor-pointer hover:bg-tertiary-container transition-colors">Makanan</span>
<span class="px-4 py-1.5 bg-tertiary-fixed text-on-tertiary-fixed-variant rounded-full font-label-sm text-label-sm cursor-pointer hover:bg-tertiary-container transition-colors">Transportasi</span>
<span class="px-4 py-1.5 bg-tertiary-fixed text-on-tertiary-fixed-variant rounded-full font-label-sm text-label-sm cursor-pointer hover:bg-tertiary-container transition-colors">Pribadi</span>
</div>
</section>
<!-- Tombol Simpan -->
<footer class="pt-base">
<button class="w-full h-16 bg-primary-container text-on-primary-container rounded-lg flex items-center justify-center gap-base font-headline-sm text-headline-sm active-press hover:bg-primary shadow-md disabled:opacity-50 disabled:cursor-not-allowed transition-all" id="save-btn">
<span class="material-symbols-outlined">save</span>
                    Simpan
                </button>
<p class="text-center text-on-surface-variant font-label-sm text-label-sm mt-stack-md opacity-60" id="hint-text">
                    SnapLedger secara otomatis mengekstrak data dari struk Anda.
                </p>
</footer>
<div class="absolute -top-12 -left-12 w-32 h-32 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-12 -right-12 w-32 h-32 bg-secondary/5 rounded-full blur-3xl pointer-events-none"></div>
</div>
</main>
<!-- Toast -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-container-padding py-stack-md rounded-full font-label-md text-label-md flex items-center gap-base shadow-2xl opacity-0 translate-y-10 transition-all duration-300 pointer-events-none z-50" id="toast">
<span class="material-symbols-outlined text-secondary-fixed" id="toast-icon">check_circle</span>
<span id="toast-text">Struk berhasil diupload!</span>
</div>
<script>
        const cameraBtn = document.getElementById('camera-btn');
        const cameraInput = document.getElementById('camera-input');
        const imageDisplay = document.getElementById('image-display');
        const placeholderContent = document.getElementById('placeholder-content');
        const removePhotoBtn = document.getElementById('remove-photo');
        const saveBtn = document.getElementById('save-btn');
        const keteranganInput = document.getElementById('keterangan');
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toast-text');
        const toastIcon = document.getElementById('toast-icon');

        // Foto terkompres siap kirim (base64 dataURL). null = belum ada foto.
        let compressedDataUrl = null;

        // --- Kompresi foto di HP sebelum dikirim (hemat token & kuota) ---
        // Sisi terpanjang dipotong ke 1280px, kualitas JPEG 0.65. Struk tetap terbaca.
        function compressImage(file, maxEdge = 1280, quality = 0.65) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        if (width > height && width > maxEdge) {
                            height = Math.round(height * maxEdge / width);
                            width = maxEdge;
                        } else if (height >= width && height > maxEdge) {
                            width = Math.round(width * maxEdge / height);
                            height = maxEdge;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = () => reject(new Error('Gagal membaca gambar'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('Gagal membaca file'));
                reader.readAsDataURL(file);
            });
        }

        cameraBtn.addEventListener('click', () => cameraInput.click());

        cameraInput.addEventListener('change', async function (e) {
            const file = e.target.files[0];
            if (!file) return;
            try {
                compressedDataUrl = await compressImage(file);
                imageDisplay.src = compressedDataUrl;
                imageDisplay.classList.remove('hidden');
                placeholderContent.classList.add('hidden');
                removePhotoBtn.classList.remove('hidden');
            } catch (err) {
                alert('Foto gagal diproses, coba ambil ulang.');
            }
        });

        removePhotoBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            compressedDataUrl = null;
            imageDisplay.src = '';
            imageDisplay.classList.add('hidden');
            placeholderContent.classList.remove('hidden');
            removePhotoBtn.classList.add('hidden');
            cameraInput.value = '';
        });

        // Chip menambah teks ke keterangan
        document.querySelectorAll('.flex.flex-wrap.gap-base span').forEach(chip => {
            chip.addEventListener('click', () => {
                keteranganInput.value += (keteranganInput.value ? ' ' : '') + chip.innerText;
                keteranganInput.focus();
            });
        });

        function showToast(message, ok = true) {
            toastText.innerText = message;
            toastIcon.innerText = ok ? 'check_circle' : 'error';
            toastIcon.className = 'material-symbols-outlined ' + (ok ? 'text-secondary-fixed' : 'text-error-container');
            toast.classList.remove('opacity-0', 'translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }

        function setSaving(isSaving) {
            saveBtn.disabled = isSaving;
            saveBtn.innerHTML = isSaving
                ? '<span class="material-symbols-outlined animate-spin">sync</span> Mengirim...'
                : '<span class="material-symbols-outlined">save</span> Simpan';
        }

        // --- Simpan: KIRIM ASLI ke webhook n8n ---
        saveBtn.addEventListener('click', async () => {
            if (!compressedDataUrl) {
                alert('Ambil foto struk dulu.');
                return;
            }
            if (!WEBHOOK_URL || WEBHOOK_URL.includes('PASTE_URL')) {
                alert('WEBHOOK_URL belum diisi di bagian atas file index.html.');
                return;
            }

            setSaving(true);

            // Buang prefix "data:image/jpeg;base64," -> sisakan base64 murni untuk Gemini
            const base64 = compressedDataUrl.split(',')[1];

            const payload = {
                image: base64,
                mimeType: 'image/jpeg',
                note: keteranganInput.value.trim(),
                submittedAt: new Date().toISOString()
            };

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error('Server membalas ' + res.status);

                // Sukses NYATA: baru reset form
                showToast('Struk berhasil diupload!', true);
                keteranganInput.value = '';
                removePhotoBtn.click();
            } catch (err) {
                showToast('Gagal kirim: ' + err.message, false);
            } finally {
                setSaving(false);
            }
        });

        keteranganInput.addEventListener('focus', () => {
            keteranganInput.parentElement.parentElement.classList.add('scale-[1.01]');
        });
        keteranganInput.addEventListener('blur', () => {
            keteranganInput.parentElement.parentElement.classList.remove('scale-[1.01]');
        });
    </script>
</body></html>
