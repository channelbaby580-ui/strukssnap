<style>
        body {
            background-color: #f8f9fa;
            color: #191c1d;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        .squish-effect {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .squish-effect:active {
            transform: scale(0.95);
        }

        .check-draw {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: draw 0.8s cubic-bezier(0.65, 0, 0.45, 1) forwards 0.2s;
        }

        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .float-soft {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>

<!-- But if I were to follow the filter rule "Automatic Suppression": exclude if "Success/Confirmation" splash screens. -->
<!-- I will prioritize the Content Canvas for this focused Success journey. -->
<script>
        // Micro-interaction for the primary button ripple effect
        document.querySelectorAll('.squish-effect').forEach(button => {
            button.addEventListener('click', function(e) {
                let ripple = document.createElement('span');
                ripple.classList.add('ripple');
                this.appendChild(ripple);
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                setTimeout(() => { ripple.remove(); }, 600);
            });
        });
    </script>
