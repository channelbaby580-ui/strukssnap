<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .squish-active:active {
            transform: scale(0.96);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col overflow-x-hidden">
<!-- Top AppBar Component -->
<header class="w-full top-0 sticky z-40 bg-surface dark:bg-surface-dim shadow-[0px_4px_20px_rgba(0,0,0,0.04)]">
<div class="flex justify-between items-center px-md py-sm max-w-[768px] mx-auto">
<div class="flex items-center gap-base">
<span class="font-headline-md text-headline-md-mobile text-primary dark:text-primary-fixed-dim tracking-tight">StrukSnap</span>
</div>
<button class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-container-padding max-w-[768px] mx-auto w-full pb-32 pt-10">
<!-- Mascot Section -->
<div class="relative w-full max-w-[320px] mb-lg animate-float flex justify-center">
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-3xl -z-10 scale-75"></div>
<img alt="Kawaii mascot character taking a selfie with a phone" class="w-full h-auto drop-shadow-xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB--jrPEK-McFpwOptv0g9iFO-e6Mvy8kJej3j_wDIeGTo_iySqtEx5jxSNYs9Oo6VfRFN4DFZRJJe3gSVEtFU4x1bDlS-bPyC1OPZnymJN9nbyrp5yNQO6GeU7v79nA_MEM0APcIk4Ziv0zN71bdS1s0qzUnlFi7DD1OAdlC18pPBecr-UXAnQDemQCItFUoKwuyJ3hTZ9OkvL5EhCtJpbJcJK1Z5cS-xhU2d3tVAmcVZEVH8HH6EntTYyFk5VX1nnoSHe8Gsbb_Hf"/>
</div>
<!-- Branding & Message -->
<div class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg-mobile text-on-surface mb-xs">Halo, Selamat Datang!</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">
                Kelola struk belanja kamu dengan cara yang paling lucu dan mudah.
            </p>
</div>
<!-- Main Action Section -->
<div class="w-full space-y-sm flex flex-col items-center">
<button class="w-full max-w-[280px] h-[64px] bg-primary-container text-on-primary-container rounded-pill flex items-center justify-center gap-sm shadow-[0px_4px_20px_rgba(46,99,133,0.15)] hover:shadow-[0px_8px_24px_rgba(46,99,133,0.2)] squish-active transition-all duration-200 group">
<span class="material-symbols-outlined text-[28px] group-hover:rotate-12 transition-transform">camera_alt</span>
<span class="font-headline-sm text-headline-sm-mobile">Ambil Foto</span>
</button>
<button class="w-full max-w-[280px] py-sm text-primary font-label-md hover:bg-primary/5 rounded-pill transition-colors">
                Lihat Semua Riwayat
            </button>
</div>
<!-- Quick Bento Grid Stats (Minimalist Style) -->
<div class="grid grid-cols-2 gap-sm w-full mt-xl">
<div class="bg-surface-container-lowest p-md rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] border border-outline-variant/20">
<span class="material-symbols-outlined text-primary mb-xs" style="font-variation-settings: 'FILL' 1">receipt_long</span>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Total Struk</p>
<p class="font-headline-md text-headline-md text-on-surface">124</p>
</div>
<div class="bg-secondary-container p-md rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] border border-secondary-fixed-dim/30">
<span class="material-symbols-outlined text-secondary mb-xs" style="font-variation-settings: 'FILL' 1">savings</span>
<p class="font-label-sm text-label-sm text-on-secondary-container uppercase tracking-wider">Penghematan</p>
<p class="font-headline-md text-headline-md text-on-secondary-container">Rp 240k</p>
</div>

</main>

<span class="material-symbols-outlined">analytics</span>

<a class="text-on-surface-variant dark:text-outline-variant p-3 hover:bg-surface-variant/50 dark:hover:bg-surface-variant/20 rounded-full active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined">settings</span>

<script>
        // Simple haptic-like feedback on button clicks
        document.querySelectorAll('button, a').forEach(elem => {
            elem.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });

        // Background subtle movement effect
        document.addEventListener('mousemove', (e) => {
            const mascot = document.querySelector('.animate-float');
            if (mascot) {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                mascot.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
