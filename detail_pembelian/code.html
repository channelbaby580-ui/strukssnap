<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- Top App Bar -->
<header class="w-full top-0 sticky z-50 bg-surface dark:bg-surface-dim shadow-[0px_4px_20px_rgba(0,0,0,0.04)]">
<div class="flex justify-between items-center px-md py-sm max-w-[768px] mx-auto">

<main class="w-full max-w-[768px] px-container-padding pt-lg pb-xl flex flex-col gap-lg">

<span class="material-symbols-outlined text-white text-[32px]">zoom_in</span>
</div>
</div>
<div class="absolute -bottom-2 -right-2 bg-primary-container text-on-primary-container p-2 rounded-full custom-shadow">
<span class="material-symbols-outlined text-[18px]">photo_camera</span>
</div>
</div>

<!-- Form Section -->

<div class="space-y-sm">

<div class="input-glow bg-surface-container-lowest rounded-2xl custom-shadow transition-all duration-200 border border-transparent focus-within:border-primary">
<textarea class="w-full bg-transparent border-none focus:ring-0 px-md py-md font-body-lg text-body-lg placeholder:text-outline-variant resize-none" id="purchase-desc" placeholder="Contoh: Makan siang tim marketing..." rows="3"></textarea>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-md text-label-md text-primary ml-base" for="client-name">Nama Klien</label>

            </p>

</main>
<!-- Bottom Nav (Suppressed for task focus as per mandate, but keeping structural space if needed) -->
<!-- Navigation is suppressed on this sub-page to prioritize the focus on the task of "Confirming Details" -->
<script>
        // Simple Micro-interactions
        document.querySelectorAll('button, textarea, input').forEach(el => {
            el.addEventListener('touchstart', () => {
                el.classList.add('active-scale');
            });
            el.addEventListener('touchend', () => {
                el.classList.remove('active-scale');
            });
        });

        // Form focus highlights
        const inputs = document.querySelectorAll('textarea, input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('border-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('border-primary');
            });
        });
    </script>
